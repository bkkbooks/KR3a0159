body:
  text: 卷上論文典論逸篇惟此為全篇故以辨於卷首文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人善於自見而文非一體鮮能備善是以各以所長相輕所短里語曰家有斃帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁驥騄於千里仰齊足而竝馳以此相服亦良難矣蓋君子審己以度人故能免於斯纍而作論文王粲長於辭賦徐幹時有齊氣然粲之匹也如粲之初征登樓槐賦征思幹之元猿漏卮員扇橘賦雖張蔡不過也然於他文未能稱是琳瑀之章表書記今之雋也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝詞至於雜以嘲戲及其所善楊班儔也常人貴遠賤近向聲背實又患暗於自見謂己為賢夫文本同而末異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也惟通才能備其體文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟蓋文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而弗務不以康樂而加思夫然則古人賤尺璧而重寸陰懼乎時之過已而人多不強力貧賤則懾於饑寒富貴則流於逸樂遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯志士之大痛也融等已逝惟幹著論成一家言昭明文選卷五十二按昔人引典論以博物志時代最居前今以昭明所引全篇用辨於首魏志注次之其他零簡依時編録帝自敘曰初平之元董卓殺主鳩后蕩覆王室是時四海既困中平之政兼惡卓之凶逆家家思亂人人自危山東牧守咸以春秋之義衛人討州吁於濮言人人皆得討賊於是大興義兵名豪大俠富室強族飄揚雲會萬里相赴兗豫之師戰於滎陽河內之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌以還相吞滅會黃巾盛於海岱山寇暴於并冀乘勝轉攻席卷而南鄉邑望烟而奔城郭覩塵而潰百姓死亡暴骨如莽時余年五歲上以世方擾亂教余學射六歲而知射又教余騎馬八歲而能騎射矣以時之多故故每征伐余嘗從建安初上南征荊州至宛張繡降旬日而反亡兄孝廉子修從兄安民遇害時余年十歲乘馬得脫夫文武之道各隨時而用生乎中平之季長於旅戎之間是以少好弓馬於今不衰逐禽輒十里馳射常百步日夕體倦心每不厭建安十年始定冀州濊貊獻良弓燕岱獻名馬時歲之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹獵於鄴西終日手獲麞鹿九雉兔三十餘後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常徑的有常所雖每發輒中非至妙也若夫馳平原赴豐草邀狡獸截輕禽使弓不虛彎所中必洞胸斯則妙矣時軍祭酒張京在座顧彧拊手曰善余又學擊劍閲師多矣四方之法各異惟京師為善桓靈之間有虎賁王越善斯術稱於京師河內史阿言昔與越遊具得其法余從阿學之甚精熟嘗與平虜將軍劉勳奮威將軍鄧展等共飲宿聞展善有手臂曉五兵又稱其能空手入白刃余與論劍良久謂言將軍法非也余顧嘗好之又得善術因求與余對時酒酣耳熱方食芋蔗便以為杖下殿數交三中其臂左右大笑展意不平求更為之余言吾法急屬難相中面故齊臂耳展言願復一交余知其欲突以取中也因僞深進展果尋前余卻腳鄛正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其故方更授以祕術余亦願鄧將軍捐棄故伎更受要道也一坐盡歡夫事不可自謂己長余少曉持復自謂無對俗名雙戟為坐鐵室鑲楯為蔽木戶後從陳國袁敏學以單攻復每謂若神對家不知所出先日若逢敏於狹路直決耳余於他戲弄之時少所喜惟彈棊略盡其妙乃少為之賦昔京師先工有馬合鄉侯東方安世張公子嘗恨不得與彼數子者對上雅好詩書文籍雖在軍旅手不釋卷每定省從容常言人少好學則思專長則善忘長大而能勤學者惟吾與袁伯業耳余是以少誦詩論及長而備歷五經四部史漢諸子百家之言靡不畢覽所著書論詩賦凡六十篇至若智而能愚勇而知怯仁以接物恕以及人以付後之良史魏志武紀注文紀注世說巧蓻篇注史記索隱卷二十六司馬相如傳注藝文類聚卷七十四巧藝部卷八十七果部初學記卷九帝王部北堂書鈔卷三卷十卷十二帝王部太平御覽卷九十三皇王部卷五百九十二文部卷七百十服用部卷七百四十六工藝部卷九百七十四果部合録成篇按此自敘似亦篇名魏志注太平御覽二書所引較為完善意林世說注等則略引數語北堂書鈔引皆單句今竝録之袁談長而惠尚少而美紹妻劉氏愛尚數稱其才紹亦奇其貌欲以為後未顯而紹死紹妻劉性酷妬紹死僵尸未殯寵妾五人劉盡殺之以為死者有知當復見紹於地下乃髡頭墨面以毀其形尚又為盡殺死者之家魏志袁紹傳注後漢書袁紹傳注太平御覽卷三百六十五人事部劉表疾病其子琦還省疾琦性慈孝蔡瑁張允恐琦見表父子相感更有託後之意謂曰將軍命君撫臨江夏為東國藩其任至重今釋衆而來必見譴怒傷親之歡心以增其疾非孝敬也遂遏於戶外使不得見琦流涕而去魏志劉表傳注太平御覽卷五百十六宗親部論郤儉等事曰潁川郤儉能辟穀餌伏苓甘陵甘始亦善行氣老有少容廬江左慈知補導之術竝為軍吏初儉之至市伏苓價暴數倍議郎安平李覃學其辟穀餐伏苓飲寒水中瀉利殆至殞命後始來衆人無不鴟視狼顧呼吸吐納軍謀祭酒宏農董芬為之過差氣悶不通良久乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受閹豎真無事於斯術也人之逐聲乃至於是光和中北海王和平亦好道術自以當仙濟南孫雍少事之從至京師會和平病死雍因葬之東陶有書百餘卷藥數囊悉以送之後弟子夏榮言其尸解雍至今恨不取其寶書仙藥劉向惑於鴻寶之說君游眩於子政之言古今愚謬豈惟一人哉魏志華他傳注又博物志卷五引議郎李覃學郤儉辟穀食至人之逐聲乃至于是數語陳思王辨道論云世有吾王悉招至之甘陵有甘始廬江有左慈陽城有郤儉始能行氣儉善辟穀悉號三百歲自王與太子及余之兄弟咸以為調笑不全信之然嘗試郤儉辟穀百日猶與寢處行步起居自若也夫人不食七日則死而儉乃能如是左慈修房中之術可以終命然非有至情莫能行也甘始老而少容自諸術士咸共歸之王使郤孟節主領諸人博物志卷五王仲統云甘始左元放東郭延年行容成御婦人法竝為丞相所録間行其術亦得其驗降就道士劉景受雲母九子元方年三百歲莫之所在武帝臣御此藥亦云有驗劉德治淮南王獄得枕中鴻寶祕書及子向咸而奇之信黃白之術可成謂神仙之道可致卒亦無驗乃以罹罪也博物志同上君子謹乎約己宏乎接物文選陸士龍大將軍宴會詩注任彥升王文憲集序注饑餐瓊蕊渴飲飛泉文選郭景純遊仙詩注夫生之必死成之必敗然而惑者望乘風雲冀與螭龍共駕適不死之國國即丹溪其人浮遊列缺翱翔倒景然死者相襲邱壟相望逝者莫反潛者莫形足以覺也文選注同上按國即丹溪似李善是增非典論本文喪亂以來漢氏諸陵無不發掘至乃燒取玉柙金鏤體骨竝盡文選張孟陽七哀詩注欲納二女充備六宮佐宣陰陽聿修古義文選范蔚宗後漢書皇后紀論注夫生之必死天地所不能變賢聖所不能免文選劉孝標辨命論注堯崩舜避堯子于南河之南舜崩禹避舜子于陽城禹崩益避禹子于箕山之陰事見史記意林卷五如彼登山乃勤以求高如彼浮川乃勤以求遠惟心弗勤時亦靡剋意林同上應瑒云人生固有仁心答曰在親曰孝施物曰仁仁者有事之實名非無事之虛稱善者道之母群行之主意林同上序云佞邪穢政愛惡敗俗國有此二事欲不危亡不可得也意林同上桓靈之際閹寺專命于上布衣橫議于下干祿者殫貨以奉貴要名者傾身以事勢位成乎私門名定乎橫巷由是戶異議人殊論論無常檢事無定價長愛惡興朋黨意林同上夷吾侈而飽叔廉此其志不同也張竦潔而陳遵污此其行不齊也意林同上主與民有三求求其為己勞求其為己死求其為己生意林同上法者主之柄吏者民之命法欲簡而明吏欲公而平意林同上詩刺豔妻書誡晨婦司隸馮方女有國色避亂揚州袁術登城見而悅之遂取焉甚寵之諸婦教之曰將軍貴人重其志節宜數涕泣示憂愁也若如此加重馮氏後每見術遂泣術果以謂有心益寵之諸姬乃共絞殺之懸之於廁言其哀怨自殺術以其不得志而死厚加殯殮袁紹妻劉氏甚妬忌紹死未殯劉氏殺其妾五人恐死者有知復能寵之髡頭黑面以毀其容意林卷五魏志袁紹傳注後漢書袁紹傳注藝文類聚卷十八人部太平御覽卷三百六十五人事部卷三百八十一人事部上洛都尉王琰以功受封其妻泣于內恐琰富貴更娶妻妾意林卷五藝文類聚卷三十五人部太平御覽卷四百八十七人事部荊州牧劉表跨有南土子弟驕貴以酒器名三爵上曰伯雅受七勝中雅受六勝季雅受五勝又設大針于杖端有醉者輒以劖刺之驗其醉醒意林卷五太平御覽卷四百九十七人事部卷七百六十器物部卷八百三十資産部人形性同於庶類勞則早斃逸則晚死意林卷五余嘗彈碁略盡其巧少嘗作賦昔京師有東方安世張公子嘗恨不得與彼數子對之意林同上按此段與魏志注御覽等書所載俱異太子篇序云余蒙隆寵忝當上嗣憂惶踧踖上書自陳欲繁辭博稱則父子之間不文也欲略言直說則喜懼之心不達也里語曰汝無自譽觀汝作家書言其難也意林同上孝武帝承纍世之遺業遇中國之殷阜府庫餘金帛倉廩畜腐粟因此有意乎滅胸奴而得清邊境矣故即位之初從王恢之畫設馬邑之謀自元光以迄征和四五十載之間征胸奴四十餘舉盛餘踰廣漢絶梓嶺封狼居禪姑幕梁北河觀兵瀚海刈單于之旗勦閼氏之首探符離之窟掃五王之庭納休屠昆邪之附獲祭天金人之寶斬名王以千數馘首虜以萬計既窮追其散亡又摧破其積聚虜不暇於救死扶傷疲困於孕重墮隕元封初躬抗武節告以天子自將懼以兩越之誅彼時號為威震胸奴矣藝文類聚卷十二帝王部太平御覽卷八十八皇王部按北堂書鈔卷十三帝王部云劉單于之旗探符離之窟踰長城之阻登單于之臺與類聚御覽句異又躬抗武節作射秉武節惟建安二十四年二月丙午魏太子丕造百辟寶劍長四尺二寸重一斤十有五兩淬以清漳厲以鑑諸飾以文玉表以通犀光似流星名曰飛景藝文類聚卷六十軍器部初學記卷十儲宮部太平御覽卷三百四十三兵部昔周魯寶雍狐之戟屈盧之矛狐父之戈徐氏匕首凡斯皆上世名器君子雖有文事必有武備矣藝文類聚同上軍器部太平御覽卷三百三十九兵部卷三百四十六兵部司隸馮方女國色也避地揚州袁術登城見而悅之遂納焉諸姬害其寵紿言將軍以貴人有志節但見時示憂色必長見敬重馮氏如其言術益哀之諸姬因絞懸之廁言自殺術誠以為不得志而死乃厚葬之藝文類聚卷十八人部太平御覽卷三百八十一人事部上洛都尉王琰獲高幹以功封侯其妻哭於內為琰富貴更取妾故也藝文類聚卷三十五人部太平御覽卷四百八十七人事部議郎馬融以永興中帝獵廣城融從是時北州遭水潦蝗蟲融撰上林頌以諷藝文類聚卷一百災異部急賢甚於饑渴用人速於順流北堂書鈔卷十一帝王部太平御覽卷八十八皇王部結繩而治北堂書鈔卷十五帝王部洽和萬國北堂書鈔同上李尤字伯仁少以文章顯賈逵薦尤有相如楊雄之風拜蘭臺令史與劉珍等共撰漢記北堂書鈔卷六十二設官部或問屈原相如之賦孰愈曰優遊案衍屈原之尚也窮侈極妙相如之長也然原據託譬喻其意周旋綽有餘度長卿子雲意未能及北堂書鈔卷一百藝文部酒以成禮過則復敗而流於沉湎故作酒誨以戒之北堂書鈔卷一百四十八酒食部夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而友道備矣初學記卷十八人部孝文帝慈孝寬洪仁厚躬修元默以儉率下奉生送終事從約省美聲塞於宇宙仁風暢於四海太平御覽卷八十八皇王部中常待張讓子奉為太醫令與人飲酒輒裂引衣裳發露形體以為戲樂將罷又亂其舄履使小大差踦無不顛倒僵仆踒跌手足因隨而笑之太平御覽卷二百二十八職官部卷四百九十七人事部卷六百九十七服章部魏太子丕造百辟寶刀三其一長四尺三寸六分重三斤六兩文以靈龜名曰靈寶其二采似丹霞名曰含章其三鋒似嚴霜刀身劍鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗刀太平御覽卷三百四十六兵部又初學記卷十儲宮部卷二十二武部藝文類聚卷六十軍器部北堂書鈔卷一百二十三武功部皆引三寶刀事而語以御覽為最詳備昔者周魯寶赤刀孟勞楚越稱太阿純鉤余好擊劍善以短乘長故選茲良金命彼國工精而煉之至於百辟其始成也五色繞爐巨橐自鼓靈物倣佛飛鳥翔舞以為三劍三刀三匕首因姿定名以銘其拊惜乎不遇薛燭青萍也其三劍一曰飛景長四尺二寸二曰流采長四尺二寸三曰華鋌色似綵虹長四尺二寸其三刀一曰靈寶長四尺二寸文似靈龜二曰含章采似丹霞長四尺四寸三曰素質長四尺三寸刀身而劍鋏其三匕首一曰清剛長二尺三寸光似堅冰二曰陽文長二尺二寸重一斤六兩曜似朝日三日龍鱗狀似龍文太平御覽卷三百四十六兵部又藝文類聚卷六十軍器部北堂書鈔卷一百二十二武功部卷一百二十三武功部初學記卷二十二武部文選張景陽七命注竝引造劍事語皆略於御覽又二曰流采三曰華鋌書鈔作二曰華鋒三曰流采又華鋌色似采虹白帖卷二作流彩色似彩玉又書鈔曰楚國太阿徐氏匕首上世名器又文選注曰魏太子丕造素質堅而似霜造匕首理似堅冰語亦小異或有方周成王於漢昭帝者余以為周氏體聖考之作氣稟賢姚之胎教周召為保傅呂尚為太師故咳笑必含仁義之聲觀聽必覿禮義之容宏踐祚之義隆太平之化禮樂興於上頌聲作於下時成王年二十二享國三十年世永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生深宮中長婦人手矣德與體竝智與性成孝昭之崩年二十有一承衰斃之世牧雕落之民臣無潛身之智身有短折之期欲高隆周豈不謬哉太平御覽卷四百四十七人事部雒陽令郭珍居財巨億每暑夏召客侍婢數十盛裝飾被羅縠破之袒裸其中使進酒太平御覽卷四百七十二人事部卷八百四十五飲食部汝南許劭與族兄靖俱避地江東保吳郡爭論於太守許貢坐至於手足相及太平御覽卷四百九十六人事部荊州牧劉表跨有南土子弟驕貴竝好酒為三爵大曰伯雅次曰仲雅小曰季雅伯受七升仲受六升季受五升又設大針於坐端客有醉酒寢地輒以劖刺驗其醒醉是酷於趙敬侯以筒酒灌人也大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟日共宴飲嘗以盛夏三伏之際晝夜酣飲極醉至於無知云以避一時之暑二方化之故南荊有三雅之爵河朔有避暑之飲太平御覽卷四百九十七人事部卷七百六十器物部卷八百三十資産部又初學記卷三歲時部亦引避暑之飲一事孝靈帝末朝政墮廢群官有司竝湎於酒貴戚尤甚斗酒千錢常侍張讓子奉為太醫令與人飲去依露形為樂太平御覽卷八百四十五飲食部又北堂書鈔卷一百四十八酒食部
